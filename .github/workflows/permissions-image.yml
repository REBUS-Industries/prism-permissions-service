name: permissions-image

# Builds prism-permissions-service and deploys to VM 212 (prism.rebus.industries).
#
# GHCR push keeps a registry artifact; deploy builds on VM 212 over SSH because
# `docker compose pull` on the VM fails with GHCR 403 for polyrepo packages
# (same pattern as prism-fixtures-service / prism-models-service).
#
# SSH uses the `prism-dev` alias from deploy-runner ~/.ssh/config (→ VM 212).
# That is NOT a separate prism-dev stack — only prod remains.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - '.github/workflows/permissions-image.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        with:
          # Host Docker daemon — avoids pulling moby/buildkit from Docker Hub.
          driver: docker
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rebus-industries/prism-permissions-service
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy-vm212:
    needs: build-and-push
    runs-on: [self-hosted, prism-deploy]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    concurrency:
      group: prism-deploy-vm212
      cancel-in-progress: false
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Build and deploy prism-permissions to VM 212 (prod)
        env:
          # Deploy-runner SSH alias → VM 212 (prism.rebus.industries). Not a dev stack.
          DEPLOY_HOST: prism-dev
        run: |
          set -euo pipefail
          PERMS_TAG="sha-${GITHUB_SHA:0:7}"
          IMAGE="ghcr.io/rebus-industries/prism-permissions-service:${PERMS_TAG}"
          TARBALL="/tmp/prism-permissions-build-${GITHUB_RUN_ID}.tgz"

          tar czf "${TARBALL}" \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=dist \
            Dockerfile package.json package-lock.json tsconfig.json drizzle.config.ts src

          scp -o BatchMode=yes -o ConnectTimeout=10 \
            "${TARBALL}" "${DEPLOY_HOST}:/tmp/prism-permissions-build.tgz"

          ssh -o BatchMode=yes -o ConnectTimeout=10 "${DEPLOY_HOST}" env \
            "PERMS_TAG=${PERMS_TAG}" "GIT_SHA=${GITHUB_SHA}" "IMAGE=${IMAGE}" bash -s <<'REMOTE'
            set -euo pipefail
            BUILD_DIR="/tmp/prism-permissions-build"
            rm -rf "${BUILD_DIR}"
            mkdir -p "${BUILD_DIR}"
            tar xzf /tmp/prism-permissions-build.tgz -C "${BUILD_DIR}"

            docker build --no-cache --pull \
              --build-arg "GIT_SHA=${GIT_SHA}" \
              --label "org.opencontainers.image.revision=${GIT_SHA}" \
              --label "org.opencontainers.image.source=https://github.com/REBUS-Industries/prism-permissions-service" \
              -t "${IMAGE}" \
              -f "${BUILD_DIR}/Dockerfile" \
              "${BUILD_DIR}"
            docker tag "${IMAGE}" "ghcr.io/rebus-industries/prism-permissions-service:latest"

            cd /opt/prism
            if [ -f .env ] && grep -q '^PRISM_PERMISSIONS_TAG=' .env; then
              sed -i "s/^PRISM_PERMISSIONS_TAG=.*/PRISM_PERMISSIONS_TAG=${PERMS_TAG}/" .env
            else
              echo "PRISM_PERMISSIONS_TAG=${PERMS_TAG}" >> .env
            fi
            export PRISM_PERMISSIONS_TAG="${PERMS_TAG}"
            echo "Deploying prism-permissions:${PERMS_TAG} (commit ${GIT_SHA})"
            grep '^PRISM_PERMISSIONS_TAG=' .env

            docker compose up -d --force-recreate --no-deps --no-build prism-permissions
            docker compose ps prism-permissions

            HEALTH=""
            for attempt in $(seq 1 12); do
              HEALTH="$(docker exec prism-permissions wget -qO- http://127.0.0.1:8771/health 2>/dev/null || true)"
              if echo "${HEALTH}" | grep -q '"status":"ok"'; then
                break
              fi
              echo "waiting for prism-permissions health (attempt ${attempt}/12)..."
              sleep 5
            done
            echo "permissions health: ${HEALTH:-<empty>}"
            if ! echo "${HEALTH}" | grep -q '"status":"ok"'; then
              echo "::error::prism-permissions health not ok after deploy"
              docker compose ps prism-permissions || true
              docker compose logs --tail=80 prism-permissions || true
              exit 1
            fi

            # Fail deploy if invite-keys admin route is missing.
            # wget -S prints headers on stderr; 401 body still goes to stdout with -O-.
            INVITE_PROBE="$(docker exec prism-permissions sh -c 'wget -S -O- http://127.0.0.1:8771/api/access/invite-keys 2>&1' || true)"
            echo "invite-keys probe: ${INVITE_PROBE:-<empty>}"
            if echo "${INVITE_PROBE}" | grep -q 'statusCode.:404\|Not Found'; then
              echo "::error::GET /api/access/invite-keys returned 404 — invite-keys routes missing from image"
              docker inspect --format '{{.Config.Image}} {{index .Config.Labels "org.opencontainers.image.revision"}}' prism-permissions || true
              docker compose logs --tail=120 prism-permissions || true
              exit 1
            fi
            if ! echo "${INVITE_PROBE}" | grep -qE '401|Unauthorized'; then
              echo "::error::GET /api/access/invite-keys did not return 401 Unauthorized (got: ${INVITE_PROBE:-<empty>})"
              docker compose logs --tail=120 prism-permissions || true
              exit 1
            fi
            echo "invite-keys admin route ok (401 without cookie)"

            ACCESS_HEALTH="$(docker exec prism-permissions wget -qO- http://127.0.0.1:8771/api/access/health 2>/dev/null || true)"
            echo "access health: ${ACCESS_HEALTH:-<empty>}"
            if ! echo "${ACCESS_HEALTH}" | grep -q '"inviteKeys":true'; then
              echo "::error::/api/access/health missing features.inviteKeys=true — wrong build?"
              exit 1
            fi

            rm -rf "${BUILD_DIR}" /tmp/prism-permissions-build.tgz
            echo "Deployed prism-permissions:${PERMS_TAG}"
          REMOTE

